services:
  backend:
    build: ./backend
    container_name: rga-backend
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./backend/firecrawl_pool.json:/app/firecrawl_pool.json
    environment:
      - ROOT_PATH=/research
      - CORS_ORIGINS=http://localhost:3000,https://zhimingjun.com
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: rga-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_PATH=/research
      - NEXT_PUBLIC_API_BASE=/research/api
    ports:
      - "3001:3000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
